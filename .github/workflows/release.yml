name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Import Windows code-signing certificate
        if: ${{ secrets.WINDOWS_CERTIFICATE != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' && vars.WINDOWS_TIMESTAMP_URL != '' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: |
          $ErrorActionPreference = 'Stop'
          $certPath = Join-Path $env:RUNNER_TEMP 'ad-hyperoptimize-signing.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          try {
            $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
            $certificate = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
            if (!$certificate -or !$certificate.Thumbprint) { throw 'Certificate import did not return a thumbprint.' }

            $configPath = 'src-tauri/tauri.conf.json'
            $config = Get-Content $configPath -Raw | ConvertFrom-Json
            $config.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $certificate.Thumbprint -Force
            $config.bundle.windows | Add-Member -NotePropertyName digestAlgorithm -NotePropertyValue 'sha256' -Force
            $config.bundle.windows | Add-Member -NotePropertyName timestampUrl -NotePropertyValue $env:WINDOWS_TIMESTAMP_URL -Force
            $utf8NoBom = New-Object System.Text.UTF8Encoding $false
            [System.IO.File]::WriteAllText((Resolve-Path $configPath), ($config | ConvertTo-Json -Depth 32), $utf8NoBom)
          } finally {
            Remove-Item -LiteralPath $certPath -Force -ErrorAction SilentlyContinue
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AD HyperOptimize ${{ github.ref_name }}'
          releaseBody: "${{ github.event.head_commit.message }}"
          releaseDraft: false
          prerelease: false

      - name: Verify Authenticode signatures
        if: ${{ secrets.WINDOWS_CERTIFICATE != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' && vars.WINDOWS_TIMESTAMP_URL != '' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifacts = Get-ChildItem 'src-tauri/target/release/bundle' -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          if (!$artifacts) { throw 'No Windows installer artifacts were found to verify.' }
          foreach ($artifact in $artifacts) {
            $signature = Get-AuthenticodeSignature -FilePath $artifact.FullName
            if ($signature.Status -ne 'Valid') { throw "Invalid Authenticode signature for $($artifact.Name): $($signature.Status)" }
          }

      - name: Publish SHA-256 checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $artifacts = Get-ChildItem 'src-tauri/target/release/bundle' -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' } | Sort-Object FullName
          if (!$artifacts) { throw 'No Windows installer artifacts were found to checksum.' }
          $lines = foreach ($artifact in $artifacts) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $artifact.FullName).Hash.ToLowerInvariant()
            "$hash  $($artifact.Name)"
          }
          [System.IO.File]::WriteAllLines((Join-Path $PWD 'SHA256SUMS.txt'), [string[]]$lines, (New-Object System.Text.UTF8Encoding $false))
          gh release upload $env:GITHUB_REF_NAME 'SHA256SUMS.txt' --clobber

      - name: Generate latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RELEASE_NOTES: ${{ github.event.head_commit.message }}
        run: |
          $ErrorActionPreference = 'Stop'
          # Version of truth = tauri.conf.json, NOT the git tag name.
          # A mismatched/duplicate tag previously caused the manifest to
          # advertise a version the built binary didn't actually contain,
          # producing an infinite "update available" loop.
          $conf    = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $version = $conf.version
          $tag     = "${{ github.ref_name }}"
          if ($tag.TrimStart('v') -ne $version) {
            Write-Error "Tag '$tag' does not match tauri.conf.json version '$version' — aborting to avoid a mismatched release."
            exit 1
          }

          # ── 1. Find local NSIS installer ──────────────────────────────────
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (!$exe) { Write-Error "No NSIS installer found in bundle/nsis/"; exit 1 }
          Write-Host "Local installer: $($exe.FullName)"

          # ── 2. Find or generate .sig ──────────────────────────────────────
          $sigFile = Get-Item "$($exe.FullName).sig" -ErrorAction SilentlyContinue
          if (!$sigFile) {
            Write-Host "No .sig found — signing now..."
            $signArgs = @("signer", "sign")
            if ($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
              $signArgs += @("--password", $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)
            }
            $signArgs += $exe.FullName
            & npm run tauri -- @signArgs
            if ($LASTEXITCODE -ne 0) { Write-Error "Signing failed (exit $LASTEXITCODE)"; exit 1 }
            $sigFile = Get-Item "$($exe.FullName).sig" -ErrorAction SilentlyContinue
          }
          if (!$sigFile) { Write-Error "No .sig file after signing — check TAURI_SIGNING_PRIVATE_KEY secret"; exit 1 }
          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          Write-Host "Signature OK (length=$($sig.Length))"

          # ── 3. Get EXACT asset URL from GitHub API (retry up to 6×10s) ───
          # Do NOT rely on local filename — Tauri replaces spaces with dots.
          $url = $null
          for ($i = 1; $i -le 6; $i++) {
            try {
              $rel = gh api "repos/zCrxticxl/ad-hyperoptimize/releases/tags/$tag" 2>$null | ConvertFrom-Json
              $asset = $rel.assets | Where-Object { $_.name -match '-setup\.exe$' } | Select-Object -First 1
              if ($asset -and $asset.browser_download_url) {
                $url = $asset.browser_download_url.Trim()
                Write-Host "Asset URL (attempt $i): $url"
                break
              }
            } catch { Write-Host "API attempt $i failed: $_" }
            Write-Host "Retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          if (!$url) { Write-Error "Could not retrieve setup.exe URL from GitHub API after 6 attempts"; exit 1 }

          # ── 4. Verify the URL actually returns 200 ───────────────────────
          try {
            $r = Invoke-WebRequest -Uri $url -Method Head -UseBasicParsing -TimeoutSec 30
            if ($r.StatusCode -ne 200) { Write-Error "URL returned HTTP $($r.StatusCode)"; exit 1 }
            Write-Host "URL verified: HTTP $($r.StatusCode)"
          } catch { Write-Error "URL unreachable: $_"; exit 1 }

          # ── 5. Build manifest ─────────────────────────────────────────────
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $manifest = [ordered]@{
            version  = $version
            notes    = $env:RELEASE_NOTES   # env var — safe against quotes/newlines
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          }
          $json = $manifest | ConvertTo-Json -Depth 5

          # ── 6. Write WITHOUT BOM (serde_json fails on BOM) ───────────────
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$PWD/latest.json", $json, $utf8NoBom)

          # ── 7. Verify the file is valid JSON ─────────────────────────────
          $null = Get-Content "latest.json" -Raw | ConvertFrom-Json
          Write-Host "latest.json OK — version=$version url=$url"

          # ── 8. Upload ─────────────────────────────────────────────────────
          gh release upload $tag "latest.json" --clobber
          Write-Host "✓ latest.json uploaded to $tag"
