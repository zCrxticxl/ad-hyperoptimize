name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AD HyperOptimize ${{ github.ref_name }}'
          releaseBody: ${{ github.event.head_commit.message }}
          releaseDraft: false
          prerelease: false

      - name: Generate latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $tag    = "${{ github.ref_name }}"

          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (!$exe) { Write-Error "No NSIS installer found"; exit 1 }

          # Try existing .sig first (generated by tauri-action if signing worked)
          $sigFile = Get-Item "$($exe.FullName).sig" -ErrorAction SilentlyContinue

          # If not, sign now (TAURI_SIGNING_PRIVATE_KEY env var is picked up automatically)
          if (!$sigFile) {
            Write-Host "No .sig found — signing now..."
            $signArgs = @("signer", "sign")
            if ($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
              $signArgs += @("--password", $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)
            }
            $signArgs += $exe.FullName
            & npm run tauri -- @signArgs
            $sigFile = Get-Item "$($exe.FullName).sig" -ErrorAction SilentlyContinue
          }

          if (!$sigFile) { Write-Error "Signing failed — check TAURI_SIGNING_PRIVATE_KEY secret"; exit 1 }

          $sig     = (Get-Content $sigFile.FullName -Raw).Trim()
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          # Get exact browser download URL from GitHub (avoids filename/encoding guessing)
          $url = gh release view $tag --json assets --jq '.assets[] | select(.name | endswith("-setup.exe")) | .browserDownloadUrl' 2>$null
          if (!$url) {
            # fallback: construct manually with encoding
            $encodedName = [Uri]::EscapeDataString($exe.Name)
            $url = "https://github.com/zCrxticxl/ad-hyperoptimize/releases/download/$tag/$encodedName"
          }
          Write-Host "Download URL: $url"

          $json = [ordered]@{
            version  = $version
            notes    = "${{ github.event.head_commit.message }}"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File "latest.json" -Encoding UTF8
          Write-Host "Uploading latest.json..."
          gh release upload $tag "latest.json" --clobber
