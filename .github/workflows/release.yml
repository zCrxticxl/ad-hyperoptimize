name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AD HyperOptimize ${{ github.ref_name }}'
          releaseBody: "${{ github.event.head_commit.message }}"
          releaseDraft: false
          prerelease: false

      - name: Generate latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RELEASE_NOTES: ${{ github.event.head_commit.message }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ github.ref_name }}".TrimStart('v')
          $tag     = "${{ github.ref_name }}"

          # ── 1. Find local NSIS installer ──────────────────────────────────
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (!$exe) { Write-Error "No NSIS installer found in bundle/nsis/"; exit 1 }
          Write-Host "Local installer: $($exe.FullName)"

          # ── 2. Find or generate .sig ──────────────────────────────────────
          $sigFile = Get-Item "$($exe.FullName).sig" -ErrorAction SilentlyContinue
          if (!$sigFile) {
            Write-Host "No .sig found — signing now..."
            $signArgs = @("signer", "sign")
            if ($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
              $signArgs += @("--password", $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)
            }
            $signArgs += $exe.FullName
            & npm run tauri -- @signArgs
            if ($LASTEXITCODE -ne 0) { Write-Error "Signing failed (exit $LASTEXITCODE)"; exit 1 }
            $sigFile = Get-Item "$($exe.FullName).sig" -ErrorAction SilentlyContinue
          }
          if (!$sigFile) { Write-Error "No .sig file after signing — check TAURI_SIGNING_PRIVATE_KEY secret"; exit 1 }
          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          Write-Host "Signature OK (length=$($sig.Length))"

          # ── 3. Get EXACT asset URL from GitHub API (retry up to 6×10s) ───
          # Do NOT rely on local filename — Tauri replaces spaces with dots.
          $url = $null
          for ($i = 1; $i -le 6; $i++) {
            try {
              $rel = gh api "repos/zCrxticxl/ad-hyperoptimize/releases/tags/$tag" 2>$null | ConvertFrom-Json
              $asset = $rel.assets | Where-Object { $_.name -match '-setup\.exe$' } | Select-Object -First 1
              if ($asset -and $asset.browser_download_url) {
                $url = $asset.browser_download_url.Trim()
                Write-Host "Asset URL (attempt $i): $url"
                break
              }
            } catch { Write-Host "API attempt $i failed: $_" }
            Write-Host "Retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          if (!$url) { Write-Error "Could not retrieve setup.exe URL from GitHub API after 6 attempts"; exit 1 }

          # ── 4. Verify the URL actually returns 200 ───────────────────────
          try {
            $r = Invoke-WebRequest -Uri $url -Method Head -UseBasicParsing -TimeoutSec 30
            if ($r.StatusCode -ne 200) { Write-Error "URL returned HTTP $($r.StatusCode)"; exit 1 }
            Write-Host "URL verified: HTTP $($r.StatusCode)"
          } catch { Write-Error "URL unreachable: $_"; exit 1 }

          # ── 5. Build manifest ─────────────────────────────────────────────
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $manifest = [ordered]@{
            version  = $version
            notes    = $env:RELEASE_NOTES   # env var — safe against quotes/newlines
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          }
          $json = $manifest | ConvertTo-Json -Depth 5

          # ── 6. Write WITHOUT BOM (serde_json fails on BOM) ───────────────
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$PWD/latest.json", $json, $utf8NoBom)

          # ── 7. Verify the file is valid JSON ─────────────────────────────
          $null = Get-Content "latest.json" -Raw | ConvertFrom-Json
          Write-Host "latest.json OK — version=$version url=$url"

          # ── 8. Upload ─────────────────────────────────────────────────────
          gh release upload $tag "latest.json" --clobber
          Write-Host "✓ latest.json uploaded to $tag"
